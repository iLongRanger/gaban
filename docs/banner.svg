<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="GABAN — operator console for lead-generation pipeline">
  <defs>
    <!-- dark obsidian gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06090E"/>
      <stop offset="55%" stop-color="#0A0F16"/>
      <stop offset="100%" stop-color="#070A10"/>
    </linearGradient>

    <!-- radial spotlight (plasma mint) -->
    <radialGradient id="spot" cx="22%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#5EEAD4" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>

    <!-- amber spot -->
    <radialGradient id="spot2" cx="92%" cy="105%" r="45%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>

    <!-- dot grid pattern -->
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="none"/>
      <circle cx="0.5" cy="0.5" r="0.6" fill="#E8EEF4" fill-opacity="0.06"/>
    </pattern>

    <!-- meter glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .mono { font-family: 'Azeret Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace; }
      .sans { font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif; }
      .label { letter-spacing: 0.18em; text-transform: uppercase; font-size: 10px; fill: #7A8694; font-weight: 500; }
      .ink   { fill: #E8EEF4; }
      .mute  { fill: #C4CCD6; }
      .accent{ fill: #5EEAD4; }
      .warn  { fill: #FBBF24; }
      .danger{ fill: #F87171; }
      .line  { stroke: rgba(232,238,244,0.12); }
      .lineSoft { stroke: rgba(232,238,244,0.06); }
    </style>
  </defs>

  <!-- background stack -->
  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>
  <rect width="1280" height="420" fill="url(#spot)"/>
  <rect width="1280" height="420" fill="url(#spot2)"/>

  <!-- top status strip -->
  <line x1="0" y1="46" x2="1280" y2="46" class="line" stroke-width="1"/>
  <g>
    <circle cx="36" cy="23" r="4" fill="#5EEAD4"/>
    <circle cx="36" cy="23" r="9" fill="none" stroke="#5EEAD4" stroke-opacity="0.35" stroke-width="1"/>
    <text x="52" y="27" class="mono label" fill="#5EEAD4">SECTOR / METRO VANCOUVER</text>
    <text x="1058" y="27" class="mono label">14:22:07 PT</text>
    <line x1="1158" y1="13" x2="1158" y2="33" class="line" stroke-width="1"/>
    <rect x="1172" y="11" width="74" height="22" rx="2" fill="none" class="line" stroke-width="1"/>
    <text x="1182" y="26" class="mono label">◐ DARK</text>
  </g>

  <!-- WORD MARK -->
  <g transform="translate(64, 96)">
    <!-- glyph -->
    <rect x="0" y="-2" width="42" height="42" rx="3" fill="rgba(94,234,212,0.08)" stroke="#5EEAD4" stroke-width="1"/>
    <text x="21" y="27" class="mono accent" font-size="22" font-weight="700" text-anchor="middle">⌬</text>

    <!-- title -->
    <text x="58" y="22" class="mono ink" font-size="14" font-weight="700" letter-spacing="0.22em">GABAN</text>
    <text x="58" y="40" class="mono label">OPERATOR CONSOLE · v1</text>
  </g>

  <!-- big pitch -->
  <g transform="translate(64, 168)">
    <text class="sans ink" font-size="44" font-weight="700" letter-spacing="-0.02em">
      Lead-gen telemetry
    </text>
    <text y="50" class="sans" font-size="44" font-weight="300" letter-spacing="-0.02em" fill="#C4CCD6">
      for a one-operator shop.
    </text>
    <text y="92" class="sans" font-size="14" fill="#7A8694">
      Discover · score · draft · sequence — all from one obsidian dashboard.
    </text>
  </g>

  <!-- right-side mock dashboard -->
  <g transform="translate(750, 86)">

    <!-- frame -->
    <g>
      <rect x="0" y="0" width="466" height="298" rx="3" fill="rgba(12,17,23,0.65)" class="line" stroke-width="1"/>
      <!-- corner brackets -->
      <g stroke="#5EEAD4" stroke-width="1" fill="none">
        <path d="M0 12 L0 0 L12 0"/>
        <path d="M454 0 L466 0 L466 12"/>
        <path d="M0 286 L0 298 L12 298"/>
        <path d="M454 298 L466 298 L466 286"/>
      </g>

      <!-- card label row -->
      <text x="20" y="28" class="mono label">OVERVIEW · 01</text>
      <circle cx="438" cy="24" r="3.5" fill="#5EEAD4"/>
      <circle cx="438" cy="24" r="7" fill="none" stroke="#5EEAD4" stroke-opacity="0.4"/>

      <line x1="20" y1="44" x2="446" y2="44" class="lineSoft" stroke-width="1"/>

      <!-- 4 stat tiles -->
      <g transform="translate(20, 60)">
        <!-- tile 1 SENT -->
        <g>
          <rect x="0" y="0" width="100" height="68" rx="2" class="line" stroke-width="1" fill="rgba(232,238,244,0.02)"/>
          <g stroke="#5EEAD4" stroke-width="1" fill="none">
            <path d="M0 6 L0 0 L6 0"/><path d="M94 0 L100 0 L100 6"/>
            <path d="M0 62 L0 68 L6 68"/><path d="M94 68 L100 68 L100 62"/>
          </g>
          <text x="10" y="20" class="mono label">SENT TODAY</text>
          <text x="10" y="50" class="mono accent" font-size="22" font-weight="600">12<tspan fill="#555E6B" font-size="13">/40</tspan></text>
        </g>

        <!-- tile 2 SCHEDULED -->
        <g transform="translate(108, 0)">
          <rect x="0" y="0" width="100" height="68" rx="2" class="line" stroke-width="1" fill="rgba(232,238,244,0.02)"/>
          <g stroke="#5EEAD4" stroke-width="1" fill="none">
            <path d="M0 6 L0 0 L6 0"/><path d="M94 0 L100 0 L100 6"/>
            <path d="M0 62 L0 68 L6 68"/><path d="M94 68 L100 68 L100 62"/>
          </g>
          <text x="10" y="20" class="mono label">SCHEDULED</text>
          <text x="10" y="50" class="mono ink" font-size="22" font-weight="600">28</text>
        </g>

        <!-- tile 3 ACTIVE -->
        <g transform="translate(216, 0)">
          <rect x="0" y="0" width="100" height="68" rx="2" class="line" stroke-width="1" fill="rgba(232,238,244,0.02)"/>
          <g stroke="#5EEAD4" stroke-width="1" fill="none">
            <path d="M0 6 L0 0 L6 0"/><path d="M94 0 L100 0 L100 6"/>
            <path d="M0 62 L0 68 L6 68"/><path d="M94 68 L100 68 L100 62"/>
          </g>
          <text x="10" y="20" class="mono label">ACTIVE CMP</text>
          <text x="10" y="50" class="mono ink" font-size="22" font-weight="600">3</text>
        </g>

        <!-- tile 4 REPLIES -->
        <g transform="translate(324, 0)">
          <rect x="0" y="0" width="102" height="68" rx="2" class="line" stroke-width="1" fill="rgba(232,238,244,0.02)"/>
          <g stroke="#5EEAD4" stroke-width="1" fill="none">
            <path d="M0 6 L0 0 L6 0"/><path d="M96 0 L102 0 L102 6"/>
            <path d="M0 62 L0 68 L6 68"/><path d="M96 68 L102 68 L102 62"/>
          </g>
          <text x="10" y="20" class="mono label">REPLIES</text>
          <text x="10" y="50" class="mono accent" font-size="22" font-weight="600">7</text>
        </g>
      </g>

      <!-- Lead row -->
      <g transform="translate(20, 156)">
        <rect x="0" y="0" width="426" height="124" rx="2" class="line" stroke-width="1" fill="rgba(232,238,244,0.02)"/>
        <g stroke="#5EEAD4" stroke-width="1" fill="none">
          <path d="M0 6 L0 0 L6 0"/><path d="M420 0 L426 0 L426 6"/>
          <path d="M0 118 L0 124 L6 124"/><path d="M420 124 L426 124 L426 118"/>
        </g>

        <text x="14" y="22" class="mono label">ID/0142 · RESTAURANT</text>
        <text x="14" y="48" class="sans ink" font-size="16" font-weight="600">The River's Reach Pub</text>
        <text x="14" y="68" class="mono" fill="#7A8694" font-size="11">↗ 4.2 KM · 1101 Quayside Dr, NW</text>

        <!-- status tag -->
        <rect x="14" y="84" width="64" height="20" rx="2" fill="none" stroke="#5EEAD4" stroke-opacity="0.5"/>
        <circle cx="22" cy="94" r="2.4" fill="#5EEAD4"/>
        <text x="30" y="98" class="mono accent" font-size="9" letter-spacing="0.14em" font-weight="500">NEW</text>

        <!-- score tower -->
        <text x="412" y="48" class="mono accent" font-size="32" font-weight="600" text-anchor="end">82</text>
        <text x="412" y="62" class="mono label" text-anchor="end">/100</text>

        <!-- segmented meter -->
        <g transform="translate(292, 84)">
          <rect x="0"   y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="12"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="24"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="36"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="48"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="60"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="72"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="84"  y="0" width="10" height="6" rx="1" fill="#5EEAD4" filter="url(#glow)"/>
          <rect x="96"  y="0" width="10" height="6" rx="1" fill="rgba(232,238,244,0.12)"/>
          <rect x="108" y="0" width="10" height="6" rx="1" fill="rgba(232,238,244,0.12)"/>
        </g>
      </g>
    </g>
  </g>

  <!-- bottom telemetry strip -->
  <g transform="translate(64, 360)">
    <text x="0"   y="0" class="mono label">N=22</text>
    <text x="60"  y="0" class="mono label" fill="rgba(232,238,244,0.18)">│</text>
    <text x="78"  y="0" class="mono label">TOP 82</text>
    <text x="146" y="0" class="mono label" fill="rgba(232,238,244,0.18)">│</text>
    <text x="164" y="0" class="mono label">AVG 64</text>
    <text x="232" y="0" class="mono label" fill="rgba(232,238,244,0.18)">│</text>
    <text x="250" y="0" class="mono label">CYCLE 2026-W18</text>
    <text x="370" y="0" class="mono label" fill="rgba(232,238,244,0.18)">│</text>
    <text x="388" y="0" class="mono label warn" fill="#FBBF24">SQLITE · ONLINE</text>
  </g>

  <!-- subtle scan line at the very bottom -->
  <line x1="0" y1="419" x2="1280" y2="419" class="line" stroke-width="1"/>
</svg>
